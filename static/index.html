<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resume Tailor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      pre { font-family: 'Monaco', 'Menlo', monospace; }
      .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      .smooth-transition { transition: all 0.3s ease; }
      .input-focus { @apply focus:ring-2 focus:ring-purple-500 focus:border-transparent; }
    </style>
  </head>
  <body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-12">
        <div class="gradient-bg rounded-lg shadow-lg p-8 text-white">
          <h1 class="text-4xl md:text-5xl font-bold mb-2">Resume Tailor</h1>
          <p class="text-lg opacity-90">Customize your resume for any job posting</p>
        </div>
      </div>

      <!-- Main Form -->
      <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <form id="jobForm" class="space-y-6">
          <div>
            <label for="jobUrl" class="block text-sm font-semibold text-gray-700 mb-2">
              <span class="text-red-500">*</span> Job Posting URL
            </label>
            <input 
              type="url" 
              id="jobUrl" 
              placeholder="https://www.linkedin.com/jobs/..." 
              required 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none input-focus smooth-transition"
            />
            <p class="text-xs text-gray-500 mt-1">Paste the URL of the job posting you want to tailor for</p>
          </div>

          <div>
            <label for="resumeUrl" class="block text-sm font-semibold text-gray-700 mb-2">
              Resume PDF URL <span class="text-gray-500 font-normal">(Optional)</span>
            </label>
            <input 
              type="url" 
              id="resumeUrl" 
              placeholder="https://example.com/resume.pdf" 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none input-focus smooth-transition"
            />
            <p class="text-xs text-gray-500 mt-1">If not provided, a default resume will be used</p>
          </div>

          <button 
            type="submit"
            class="w-full gradient-bg text-white font-semibold py-3 px-4 rounded-lg hover:shadow-lg smooth-transition transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Generate Suggestions
          </button>
        </form>
      </div>

      <!-- Suggestions Section -->
      <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
          <span class="w-8 h-8 gradient-bg rounded-full text-white flex items-center justify-center text-sm font-bold mr-3">1</span>
          Suggestions
        </h2>
        <div id="suggestions" class="min-h-12 text-gray-600">
          <p class="text-gray-400">Submit a job posting URL to get started</p>
        </div>
      </div>

      <!-- Revised Resume Section -->
      <div class="bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
          <span class="w-8 h-8 gradient-bg rounded-full text-white flex items-center justify-center text-sm font-bold mr-3">2</span>
          Revised Resume Content
        </h2>
        <pre id="revised" class="bg-gray-900 text-gray-100 rounded-lg p-6 overflow-x-auto text-sm leading-relaxed min-h-12">Your tailored resume will appear here...</pre>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
